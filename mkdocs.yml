site_name: ProntoCare — REQ 2026.1 T01
site_description: Documentação do projeto ProntoCare (Requisitos de Software).
site_url: https://mdsreq-fga-unb.github.io/REQ-2026.1-T01-ProntoCare/
repo_url: https://github.com/mdsreq-fga-unb/REQ-2026.1-T01-ProntoCare
repo_name: mdsreq-fga-unb/REQ-2026.1-T01-ProntoCare
edit_uri: edit/main/docs/

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - toc:
      toc_depth: 3
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

nav:
  - Início: index.md
  - Visão do Produto:
      - visao-produto/index.md
      - O Negócio e o Problema:
          - Cliente e negócio: visao-produto/cliente-e-negocio.md
          - Cenário, problema e desafios: visao-produto/cenario-problema-e-desafios.md
          - Stakeholders e segmentação: visao-produto/stakeholders-e-segmentacao.md
      - A Solução e o Impacto:
          - Solução e características: visao-produto/solucao-e-caracteristicas.md
          - Intervenção social: visao-produto/intervencao-social.md
      - Estratégia e Engenharia:
          - Estratégias de engenharia de software: visao-produto/estrategias-engenharia-de-software.md
          - Engenharia de requisitos: visao-produto/engenharia-de-requisitos.md
      - Planejamento e Alinhamento:
          - Cronograma e entregas: visao-produto/cronograma-e-entregas.md
          - Interação entre equipe e cliente: visao-produto/interacao-equipe-cliente.md
      - Especificação e Backlog:
          - Requisitos de software: visao-produto/requisitos-de-software.md
          - DoR e DoD: visao-produto/DoR-DoD.md
          - Backlog de produto: visao-produto/backlog-de-produto.md
          - Lições aprendidas: visao-produto/lições-aprendidas.md
  - Atas e Vídeos:
      - atas-e-videos/index.md
      - Sprint 0: atas-e-videos/sprint-0.md
      - Sprint 1: atas-e-videos/sprint-1.md
      - Sprint 2: atas-e-videos/sprint-2.md
      - Sprint 3: atas-e-videos/sprint-3.md
      - Sprint 4: atas-e-videos/sprint-4.md
      - Sprint 5: atas-e-videos/sprint-5.md
      - Sprint 6: atas-e-videos/sprint-6.md
      - Sprint 7: atas-e-videos/sprint-7.md
      - Sprint 8: atas-e-videos/sprint-8.md
      - Sprint 9: atas-e-videos/sprint-9.md
  - Planejamento e Organização:
      - planejamento-organizacao/index.md
      - Acompanhamento de US e RNF: planejamento-organizacao/progresso-do-projeto.md
      - Planejamento e Quadro Figma: planejamento-organizacao/planejamento.md
      - Backlog de produto: planejamento-organizacao/backlog-de-produto.md
  - Entregas de Unidade:
      - entregas/index.md
      - Entrega 1: entregas/entrega-1.md
      - Entrega 2: entregas/entrega-2.md
      - Entrega 3: entregas/entrega-3.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mdsreq-fga-unb/REQ-2026.1-T01-ProntoCare